services:
  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "3010:80"

  webhook:
    image: node:22-alpine     # nur Trigger schreiben; git macht der Host -> kein git/ssh nötig
    container_name: portfolio-webhook
    restart: unless-stopped
    working_dir: /webhook
    command: node server.js
    volumes:
      - ./webhook:/webhook
      - .:/app
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - APP_DIR=/app
      - BRANCH=main
    ports:
      - "9000:9000"

  oauth:
    image: node:22-alpine
    container_name: portfolio-oauth
    restart: unless-stopped
    working_dir: /oauth
    command: node server.js
    volumes:
      - ./oauth:/oauth
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - ORIGIN=${ORIGINS}
      - REDIRECT_URL=${REDIRECT_URL}
