services:
  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "3010:80"

  webhook:
    image: node:22-slim       # needs git for fetch/reset — alpine does not ship git
    container_name: portfolio-webhook
    restart: unless-stopped
    working_dir: /webhook
    command: >
      sh -c "command -v git >/dev/null 2>&1 || (apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*);
             git config --global --add safe.directory /app;
             exec node server.js"
    volumes:
      - ./webhook:/webhook
      - .:/app
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - APP_DIR=/app
      - BRANCH=main
    ports:
      - "9000:9000"

  oauth:
    image: node:22-alpine
    container_name: portfolio-oauth
    restart: unless-stopped
    working_dir: /oauth
    command: node server.js
    volumes:
      - ./oauth:/oauth
    environment:
      - NODE_ENV=production
      - PORT=3000
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - ORIGIN=${ORIGINS}
      - REDIRECT_URL=${REDIRECT_URL}

  newt:
    image: fosrl/newt
    container_name: portfolio-newt
    restart: unless-stopped
    environment:
      - PANGOLIN_ENDPOINT=https://pangolin.spawnpoint.win
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
