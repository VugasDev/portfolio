services:
  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "3010:80"

  webhook:
    image: node:22-alpine
    container_name: portfolio-webhook
    restart: unless-stopped
    working_dir: /webhook
    command: node server.js
    volumes:
      - ./webhook:/webhook
      - .:/app
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - APP_DIR=/app
    ports:
      - "9000:9000"

  oauth:
    image: vencax/netlify-cms-github-oauth-provider
    container_name: portfolio-oauth
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - ORIGIN=${ORIGINS}
      - ORIGINS=${ORIGINS}
      - REDIRECT_URL=${REDIRECT_URL}

  newt:
    image: fosrl/newt
    container_name: portfolio-newt
    restart: unless-stopped
    environment:
      - PANGOLIN_ENDPOINT=https://pangolin.spawnpoint.win
      - NEWT_ID=${NEWT_ID}
      - NEWT_SECRET=${NEWT_SECRET}
