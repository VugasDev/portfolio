server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Docker-interner DNS — damit nginx beim Start nicht crasht wenn Upstreams down sind
    resolver 127.0.0.11 valid=10s ipv6=off;

    location /api/auth {
        set $oauth_upstream "portfolio-oauth:3000";
        proxy_pass http://$oauth_upstream/auth;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/callback {
        set $oauth_upstream "portfolio-oauth:3000";
        proxy_pass http://$oauth_upstream/callback;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /webhook {
        set $webhook_upstream "portfolio-webhook:9000";
        proxy_pass http://$webhook_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Hub-Signature-256 $http_x_hub_signature_256;
    }

    # Decap CMS erwartet config.yml als text/yaml
    location = /admin/config.yml {
        default_type text/yaml;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ $uri.html /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
